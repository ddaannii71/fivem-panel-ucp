version: '3.8'

services:
  eureka-server:
    build: ./eureka-server 
    container_name: eureka-server
    expose:
      - "8761"
    networks:
      - ucp-net

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080" 
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      - eureka-server
    networks:
      - ucp-net

  auth-service:
    build: ./auth-service
    container_name: auth-service
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - JWT_SECRET=${JWT_SECRET}
      - SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET}
    depends_on:
      - eureka-server
    networks:
      - ucp-net

  player-service:
    build: ./player-service
    container_name: player-service
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:mariadb://${DB_HOST}:3306/${DB_NAME}
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
    depends_on:
      - eureka-server
    networks:
      - ucp-net

  mgmt-service:
    build: ./mgmt-service
    container_name: mgmt-service
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - TXADMIN_URL=${TXADMIN_URL}
      - TXADMIN_USERNAME=${TXADMIN_USER}
      - TXADMIN_PASSWORD=${TXADMIN_PASSWORD}
    depends_on:
      - eureka-server
    networks:
      - ucp-net

networks:
  ucp-net:
    driver: bridge